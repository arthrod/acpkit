name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v7

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync --extra dev --frozen

    - name: Check Formatting (make check-formatted)
      run: |
        source .venv/bin/activate
        make check-formatted

    - name: Check Code (make check)
      run: |
        source .venv/bin/activate
        make check

    - name: Run Tests (make tests)
      run: |
        source .venv/bin/activate
        make tests

  pydantic-ai-compatibility:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pydantic-ai-version: ["2.9.0", "2.9.1", "2.10.0", "2.11.0", "2.12.0", "2.13.0", "2.14.0", "2.14.1", "2.15.0", "2.16.0"]

    steps:
    - uses: actions/checkout@v7

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python 3.11
      run: uv python install 3.11

    - name: Test Pydantic AI ${{ matrix.pydantic-ai-version }}
      run: |
        PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 uv run --package pydantic-acp --with pytest --with pytest-asyncio --with pyyaml --with openai --with mcp \
          --with "pydantic-ai-slim==${{ matrix.pydantic-ai-version }}" \
          pytest -p pytest_asyncio.plugin tests/pydantic tests/test_native_pydantic_agent.py -q

    - name: Type check Pydantic AI ${{ matrix.pydantic-ai-version }}
      run: |
        uv run --package pydantic-acp --with pytest --with pytest-asyncio --with pyyaml --with ty --with openai --with mcp \
          --with "pydantic-ai-slim==${{ matrix.pydantic-ai-version }}" \
          ty check packages/adapters/pydantic-acp/src tests/pydantic examples/pydantic \
          tests/test_native_pydantic_agent.py

  langchain-stack-compatibility:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python 3.11
      run: uv python install 3.11

    - name: Test and type check the supported LangChain stack
      run: make check-langchain-stack
