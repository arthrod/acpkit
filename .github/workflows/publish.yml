name: Publish Packages

on:
  push:
    tags:
      - "v[0-9]*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build And Publish Workspace
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repository
        uses: actions/checkout@v7

      - name: Set Up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Set Up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Validate, Build, And Smoke Test Release
        run: |
          uv sync --frozen --all-extras
          make release RELEASE_TAG="${GITHUB_REF_NAME}"

      - name: Upload Validated Release Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: acpkit-${{ github.ref_name }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

      - name: Publish Validated Artifacts
        run: uv publish --trusted-publishing always dist/*
