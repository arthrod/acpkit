[project]
name = "pydantic-acp"
dynamic = ["version"]
description = "ACP adapter for pydantic-ai agents."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache 2.0" }
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    # fixed for compliance with current ACP API
    "agent-client-protocol==0.9.0",
    "anyio>=4.0.0",
    "pydantic-ai-slim>=2.0.0,<=2.9.1",
    "pydantic>=2.7",
    "typing-extensions>=4.12.0",
]

[project.optional-dependencies]
harness = ["pydantic-ai-harness[code-mode]>=0.4.0"]

[project.urls]
Homepage = "https://vcoderun.github.io/acpkit/pydantic-acp/"
Issues = "https://github.com/vcoderun/acpkit/issues"
Repository = "https://github.com/vcoderun/acpkit"
Source = "https://github.com/vcoderun/acpkit/tree/main/packages/adapters/pydantic-acp"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.version]
path = "src/pydantic_acp/_version.py"

[tool.hatch.build.targets.wheel]
packages = ["src/pydantic_acp"]
